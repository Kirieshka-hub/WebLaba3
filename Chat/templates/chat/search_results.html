{% for user in users %}
<div class="user-block" data-username="{{ user.username }}">
    <div class="user-avatar-box">
        <img src="{{ user.profile.avatar }}" alt="{{ user.profile.name }}" class="avatar">
    </div>
    <div class="user-info-box">
        <span class="username">{{ user.profile.name }}</span>
    </div>
</div>
{% empty %}
<p>No users found</p>
{% endfor %}
